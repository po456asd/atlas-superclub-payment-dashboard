<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATLAS Superclub Bangkok — Construction Payment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0f0f0f;
    --bg-1:#191919;
    --bg-2:#222220;
    --line:#36312a;
    --gold:#d4b07a;
    --gold-bright:#f0d895;
    --gold-dim:#9d8a5e;
    --text:#f5f2eb;
    --muted:#a39d8f;
    --danger:#c96a5a;
    --good:#7fae78;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg-0);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  body{
    background:
      radial-gradient(ellipse at top, rgba(201,169,97,0.08), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(201,169,97,0.04), transparent 60%),
      var(--bg-0);
  }
  .container{max-width:1400px;margin:0 auto;padding:32px 24px}

  /* Header */
  header{
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
    margin-bottom:32px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .brand{display:flex;align-items:center;gap:16px}
  .brand-text h1{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;font-weight:500;letter-spacing:2px;
    text-transform:uppercase;
  }
  .brand-text h1 span{color:var(--gold)}
  .brand-text p{
    font-size:10px;letter-spacing:3px;
    text-transform:uppercase;color:var(--muted);margin-top:2px;
  }
  .meta{text-align:right;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .meta span{color:var(--gold);font-weight:500;display:block;margin-top:2px;letter-spacing:1px;text-transform:capitalize}
  .meta strong{color:var(--gold);font-weight:500;display:block;margin-top:2px;letter-spacing:2px}

  /* Summary cards */
  .summary{
    display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px;
  }
  .card{
    background:linear-gradient(135deg,var(--bg-2),var(--bg-1));
    border:1px solid var(--line);
    padding:20px 18px;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:0.6;
  }
  .card-label{
    font-size:9px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px;
  }
  .card-value{
    font-family:'Inter',sans-serif;
    font-size:24px;font-weight:600;color:var(--gold-bright);
    letter-spacing:0;
  }
  .card-sub{
    font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:1px;
  }
  .card.accent .card-value{color:var(--text)}

  /* Section title */
  .section-title{
    display:flex;align-items:center;gap:12px;margin-bottom:24px;
  }
  .section-title::before,.section-title::after{
    content:'';flex:0 0 40px;height:1px;background:var(--gold-dim);
  }
  .section-title::after{flex:1}
  .section-title h2{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-weight:500;letter-spacing:3px;
    text-transform:uppercase;color:var(--gold);
  }

  /* Contractor block */
  .contractor{
    border:1px solid var(--line);
    margin-bottom:18px;
    background:linear-gradient(180deg,rgba(26,23,19,0.6),rgba(17,17,17,0.6));
  }
  .contractor-head{
    padding:18px 24px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,rgba(201,169,97,0.05),transparent);
    flex-wrap:wrap;gap:12px;
  }
  .contractor-name{
    font-family:'Cormorant Garamond',serif;
    font-size:20px;font-weight:600;color:var(--gold-bright);
    letter-spacing:1.5px;
  }
  .contractor-name small{
    display:block;font-family:'Inter',sans-serif;
    font-size:9px;color:var(--muted);letter-spacing:2px;
    text-transform:uppercase;margin-top:3px;font-weight:400;
  }
  .contractor-totals{display:flex;gap:24px;flex-wrap:wrap}
  .total-item{text-align:right}
  .total-item .lbl{
    font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  }
  .total-item .val{
    font-family:'Inter',sans-serif;
    font-size:15px;font-weight:600;color:var(--gold);margin-top:2px;
  }
  .total-item .val.remain{color:var(--text)}

  /* Contracts table */
  table{width:100%;border-collapse:collapse}
  thead th{
    font-size:9px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold-dim);font-weight:500;
    padding:12px 20px;text-align:left;
    border-bottom:1px solid var(--line);
    background:rgba(0,0,0,0.2);
  }
  thead th.num{text-align:right}
  tbody td{
    padding:14px 20px;
    border-bottom:1px solid rgba(42,38,33,0.6);
    font-size:13px;
  }
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(201,169,97,0.03)}
  td.contract-name{font-weight:500;font-size:12px}
  td.contract-name small{
    display:block;color:var(--muted);font-size:10px;
    font-weight:400;margin-top:1px;letter-spacing:0.5px;
  }
  td.num{
    text-align:right;
    font-family:'Inter',sans-serif;
    font-size:13px;font-weight:500;letter-spacing:0;
    white-space:nowrap;
  }
  td.num.paid{color:var(--gold)}
  td.num.remain{color:var(--text)}
  td.num.total{color:var(--gold-bright)}

  /* Progress bar */
  .progress-wrap{
    display:flex;align-items:center;gap:12px;min-width:160px;
  }
  .progress{
    flex:1;height:4px;background:rgba(201,169,97,0.12);
    position:relative;overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));
    box-shadow:0 0 8px rgba(201,169,97,0.4);
  }
  .progress-pct{
    font-size:11px;color:var(--gold);letter-spacing:1px;min-width:36px;text-align:right;
  }

  /* Payment Evidence Modal */
  .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}
  .modal.active{display:flex}
  .modal-content{background:var(--bg-1);border:1px solid var(--line);max-width:90%;max-height:90%;overflow:auto;position:relative}
  .modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--gold);font-size:24px;cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{color:var(--gold-bright)}
  .modal-body{padding:24px}
  .modal-body img{max-width:100%;height:auto;display:block;margin:0 auto}
  .modal-body .info{margin-top:16px;font-size:12px;color:var(--muted);line-height:1.6}
  .modal-body .info strong{color:var(--text);font-weight:600}

  /* Payment Summary */
  .payment-summary{
    background:linear-gradient(135deg,rgba(201,169,97,0.1),rgba(201,169,97,0.05));
    border:1px solid var(--gold-dim);
    border-radius:2px;
    padding:24px;
    margin-bottom:40px;
  }
  .payment-summary h3{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-weight:500;letter-spacing:2px;
    text-transform:uppercase;color:var(--gold);margin-bottom:20px;
  }
  .payment-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px}
  .payment-item{display:flex;flex-direction:column;align-items:center;text-align:center}
  .payment-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .payment-value{font-family:'Inter',sans-serif;font-size:18px;font-weight:600;color:var(--gold-bright)}
  .payment-item.deficit .payment-value{color:#d67a6a}
  .payment-item.surplus .payment-value{color:#7fae78}
  .payment-percent{font-size:12px;color:var(--muted);margin-top:4px}
  .evidence-btn{
    background:var(--gold-dim);color:var(--text);border:1px solid var(--gold);padding:10px 16px;
    font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;
    cursor:pointer;transition:0.2s;display:inline-block;
  }
  .evidence-btn:hover{background:var(--gold);color:var(--bg-0)}

  /* Footer */
  footer{
    margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
    text-align:center;font-size:9px;letter-spacing:2px;
    text-transform:uppercase;color:var(--muted);
  }
  footer span{color:var(--gold)}

  @media (max-width:900px){
    .summary{grid-template-columns:repeat(2,1fr)}
    .contractor-head{flex-direction:column;align-items:flex-start}
    .contractor-totals{width:100%;justify-content:space-between;gap:12px}
    .total-item{text-align:left}
    thead{display:none}
    tbody td{display:block;padding:6px 18px;border:none;text-align:left !important}
    tbody tr{display:block;padding:12px 0;border-bottom:1px solid var(--line)}
    td.num::before{
      content:attr(data-label);
      display:inline-block;min-width:100px;
      font-family:'Inter',sans-serif;font-size:9px;
      letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    }
  }
</style>
</head>
